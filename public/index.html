<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Orby</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='42' fill='none' stroke='white' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='14' fill='white'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#0a0a0a;
    --bg-1:#0f0f0f;
    --bg-2:#141414;
    --bg-3:#1a1a1a;
    --line:rgba(255,255,255,.08);
    --line-2:rgba(255,255,255,.14);
    --line-3:rgba(255,255,255,.22);
    --text:#f5f5f5;
    --text-2:#a1a1a1;
    --text-3:#6b6b6b;
    --text-4:#4a4a4a;
    --accent:#ffffff;
    --accent-dim:rgba(255,255,255,.06);
    --danger:#ff6b6b;
    --ok:#7ee787;
    --warn:#e3b341;
    --info:#79b8ff;
    --radius:12px;
    --radius-sm:8px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, "JetBrains Mono", monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;
    letter-spacing:-.005em;
  }

  /* ===== Layout ===== */
  .app{
    display:grid;
    grid-template-columns:260px 1fr;
    height:100dvh;
  }
  @media (max-width: 820px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
  }

  /* ===== Sidebar ===== */
  .sidebar{
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;
    padding:18px 14px;
    gap:14px;
    min-height:0;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    padding:6px 8px;
    font-weight:600;letter-spacing:-.02em;font-size:17px;
  }
  .brand-mark{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff 0%, #999 55%, #222 100%);
    box-shadow:0 0 0 1px rgba(255,255,255,.2), inset 0 0 12px rgba(0,0,0,.4);
  }
  .new-chat{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:10px 12px;border-radius:var(--radius-sm);
    background:var(--accent);color:#000;font-weight:600;font-size:13.5px;
    border:none;cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
    font-family:var(--font);
  }
  .new-chat:hover{opacity:.9}
  .new-chat:active{transform:scale(.98)}
  .side-title{
    font-size:10.5px;letter-spacing:.14em;color:var(--text-4);
    text-transform:uppercase;padding:0 8px;margin-top:6px;font-weight:600;
  }
  .history{
    flex:1;overflow-y:auto;
    display:flex;flex-direction:column;gap:2px;
    padding:0 2px;
    min-height:0;
  }
  .history-item{
    padding:8px 10px;border-radius:8px;
    color:var(--text-2);font-size:13px;
    cursor:pointer;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;
    transition:background .12s ease, color .12s ease;
  }
  .history-item:hover{background:var(--accent-dim);color:var(--text)}
  .history-item.active{background:rgba(255,255,255,.09);color:var(--text)}
  .side-foot{
    padding:8px;font-size:11px;color:var(--text-4);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center;
  }

  /* ===== Main ===== */
  .main{
    display:flex;flex-direction:column;
    height:100dvh;min-width:0;
    position:relative;
  }
  .topbar{
    height:52px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;border-bottom:1px solid var(--line);
    background:rgba(10,10,10,.85);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    z-index:5;
  }
  .topbar-left{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text-3)}
  .model-select{
    background:var(--bg-3);color:var(--text);
    border:1px solid var(--line-2);border-radius:8px;
    padding:6px 28px 6px 10px;font-size:12.5px;font-family:var(--font);
    cursor:pointer;outline:none;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23a1a1a1' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat:no-repeat;background-position:right 10px center;
  }
  .model-select:hover{border-color:var(--line-3)}
  .top-actions{display:flex;gap:8px;align-items:center}
  .icon-btn{
    background:transparent;color:var(--text-2);
    border:1px solid var(--line);border-radius:8px;
    padding:6px 10px;font-size:12px;cursor:pointer;
    font-family:var(--font);
    transition:all .12s ease;
  }
  .icon-btn:hover{color:var(--text);border-color:var(--line-3);background:var(--bg-2)}

  /* ===== Chat area — CRITICAL: proper flex + scroll ===== */
  .chat{
    flex:1;
    overflow-y:auto;
    min-height:0;
    scroll-behavior:smooth;
    padding-top:26px;
  }
  .chat-inner{
    max-width:780px;margin:0 auto;padding:0 22px;
    display:flex;flex-direction:column;gap:22px;
    /* Bottom padding = composer height + margin. Prevents last message being hidden. */
    padding-bottom:180px;
  }
  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:calc(100dvh - 240px);text-align:center;gap:14px;
    padding-bottom:40px;
  }
  .empty h1{
    font-size:34px;font-weight:600;letter-spacing:-.025em;margin:0;
    background:linear-gradient(180deg,#fff 0%, #888 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .empty p{color:var(--text-3);font-size:13.5px;margin:0}
  .suggestions{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
    margin-top:20px;max-width:580px;width:100%;
  }
  .suggest{
    text-align:left;padding:12px 14px;border-radius:10px;
    background:var(--bg-2);border:1px solid var(--line);
    color:var(--text-2);cursor:pointer;font-size:13px;line-height:1.5;
    transition:all .15s ease;font-family:var(--font);
  }
  .suggest:hover{background:var(--bg-3);border-color:var(--line-2);color:var(--text);transform:translateY(-1px)}
  @media (max-width: 620px){.suggestions{grid-template-columns:1fr}}

  /* ===== Messages ===== */
  .msg{display:flex;flex-direction:column;gap:6px;animation:fadeIn .28s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg .role{
    font-size:10.5px;letter-spacing:.12em;color:var(--text-4);
    text-transform:uppercase;font-weight:600;
  }
  .msg.user{align-items:flex-end}
  .msg.user .bubble{
    background:var(--bg-3);border:1px solid var(--line);
    padding:11px 14px;border-radius:var(--radius);
    max-width:82%;font-size:14.5px;line-height:1.6;
    white-space:pre-wrap;word-wrap:break-word;
  }
  .msg.assistant .bubble{
    line-height:1.72;font-size:14.5px;color:var(--text);
    word-wrap:break-word;
  }
  .bubble p{margin:.5em 0}
  .bubble p:first-child{margin-top:0}
  .bubble p:last-child{margin-bottom:0}
  .bubble h1,.bubble h2,.bubble h3{
    margin:1.2em 0 .5em;font-weight:600;letter-spacing:-.015em;
  }
  .bubble h1{font-size:1.35em}
  .bubble h2{font-size:1.2em}
  .bubble h3{font-size:1.08em}
  .bubble pre{
    background:#050505;border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;overflow:auto;
    font-family:var(--mono);font-size:12.5px;line-height:1.55;
    margin:.6em 0;
    position:relative;
  }
  .bubble code{
    font-family:var(--mono);font-size:.9em;
    background:rgba(255,255,255,.07);padding:1.5px 5px;border-radius:4px;
  }
  .bubble pre code{background:none;padding:0;font-size:1em}
  .bubble a{color:#fff;text-decoration:underline;text-decoration-color:rgba(255,255,255,.35);text-underline-offset:2px}
  .bubble a:hover{text-decoration-color:#fff}
  .bubble img{max-width:100%;border-radius:10px;border:1px solid var(--line);margin:.4em 0}
  .bubble ul,.bubble ol{padding-left:1.4em;margin:.5em 0}
  .bubble li{margin:.2em 0}
  .bubble table{border-collapse:collapse;margin:.6em 0;font-size:.94em}
  .bubble th,.bubble td{border:1px solid var(--line);padding:6px 10px;text-align:left}
  .bubble th{background:var(--bg-2)}
  .bubble hr{border:none;border-top:1px solid var(--line);margin:1em 0}
  .bubble blockquote{border-left:2px solid var(--line-3);padding-left:14px;color:var(--text-2);margin:.6em 0}

  /* ===== Download card for /api/files links ===== */
  .file-card{
    display:inline-flex;align-items:center;gap:10px;
    padding:8px 12px;border:1px solid var(--line);border-radius:8px;
    background:var(--bg-2);color:var(--text);text-decoration:none;
    margin:.3em 0;font-size:13px;
    transition:all .12s ease;
  }
  .file-card:hover{border-color:var(--line-3);background:var(--bg-3);text-decoration:none}
  .file-card svg{width:14px;height:14px;color:var(--text-2)}

  /* ===== Tool runs ===== */
  .tool-run{
    border:1px solid var(--line);border-radius:var(--radius);
    background:var(--bg-1);overflow:hidden;
    font-size:12.5px;
    animation:fadeIn .25s ease;
  }
  .tool-head{
    display:flex;align-items:center;gap:10px;
    padding:10px 13px;cursor:pointer;
    border-bottom:1px solid transparent;
    transition:background .12s ease;
    user-select:none;
  }
  .tool-head:hover{background:var(--bg-2)}
  .tool-run.open .tool-head{border-bottom-color:var(--line)}
  .tool-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--warn);
    box-shadow:0 0 0 3px rgba(227,179,65,.14);
    flex-shrink:0;
  }
  .tool-run.done .tool-dot{background:var(--ok);box-shadow:0 0 0 3px rgba(126,231,135,.14)}
  .tool-run.error .tool-dot{background:var(--danger);box-shadow:0 0 0 3px rgba(255,107,107,.14)}
  .tool-run.running .tool-dot{animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.82)}}
  .tool-name{font-weight:600;letter-spacing:-.005em;color:var(--text);font-family:var(--mono);font-size:12px}
  .tool-meta{color:var(--text-4);margin-left:auto;font-size:11px;font-family:var(--mono)}
  .tool-body{padding:10px 13px 13px;display:none;background:var(--bg)}
  .tool-run.open .tool-body{display:block}
  .tool-section{margin:8px 0}
  .tool-section:first-child{margin-top:0}
  .tool-section-label{
    color:var(--text-4);font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;margin-bottom:4px;font-weight:600;
  }
  .tool-section pre{
    background:#050505;border:1px solid var(--line);border-radius:8px;
    padding:9px 11px;margin:0;max-height:300px;overflow:auto;
    font-family:var(--mono);font-size:11.5px;line-height:1.55;
    white-space:pre-wrap;word-break:break-word;color:var(--text);
  }
  .caret{
    width:8px;height:8px;border-right:1.5px solid var(--text-3);
    border-bottom:1.5px solid var(--text-3);
    transform:rotate(-45deg);transition:transform .15s ease;
    flex-shrink:0;
  }
  .tool-run.open .caret{transform:rotate(45deg)}
  .tool-search-preview{margin-top:6px;display:flex;flex-direction:column;gap:6px}
  .tool-search-item{
    padding:8px 10px;border:1px solid var(--line);border-radius:6px;
    background:var(--bg-1);
  }
  .tool-search-item a{color:var(--text);font-weight:600;text-decoration:none;font-size:12.5px;display:block;margin-bottom:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tool-search-item a:hover{text-decoration:underline}
  .tool-search-item .url{color:var(--text-4);font-size:10.5px;font-family:var(--mono);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
  .tool-search-item .snip{color:var(--text-2);font-size:12px;line-height:1.5}

  /* ===== Status pill ===== */
  .status-pill{
    display:inline-flex;align-items:center;gap:8px;
    padding:5px 11px;border-radius:999px;
    background:var(--bg-1);border:1px solid var(--line);
    font-size:11.5px;color:var(--text-2);align-self:flex-start;
    font-family:var(--mono);
    animation:fadeIn .2s ease;
  }
  .status-pill .spinner{
    width:6px;height:6px;border-radius:50%;background:var(--text-2);
    animation:pulse 1.2s ease-in-out infinite;
  }

  /* ===== Composer — fixed at bottom with proper backdrop ===== */
  .composer-wrap{
    position:absolute;left:0;right:0;bottom:0;
    padding:20px 22px 22px;
    background:
      linear-gradient(180deg,
        rgba(10,10,10,0) 0%,
        rgba(10,10,10,.6) 30%,
        rgba(10,10,10,.92) 65%,
        var(--bg) 100%);
    pointer-events:none;
    z-index:10;
  }
  .composer{
    max-width:780px;margin:0 auto;
    background:var(--bg-3);border:1px solid var(--line-2);
    border-radius:20px;padding:8px 10px 8px 14px;
    display:flex;flex-direction:column;gap:2px;
    pointer-events:auto;
    box-shadow:0 12px 48px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.04) inset;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .composer:focus-within{
    border-color:var(--line-3);
    box-shadow:0 12px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.08);
  }
  .composer textarea{
    background:transparent;border:none;outline:none;color:var(--text);
    font-family:var(--font);font-size:14.5px;line-height:1.55;
    resize:none;padding:8px 4px 4px;max-height:200px;
    width:100%;
  }
  .composer textarea::placeholder{color:var(--text-4)}
  .composer-actions{
    display:flex;align-items:center;justify-content:space-between;
    padding:4px 2px 2px;gap:8px;
  }
  .composer-left{display:flex;gap:6px;align-items:center;flex:1;min-width:0}
  .composer-hint{font-size:11px;color:var(--text-4);font-family:var(--mono)}
  .chip{
    background:transparent;border:1px solid var(--line);
    color:var(--text-2);font-size:11.5px;
    padding:4px 10px;border-radius:999px;cursor:pointer;
    font-family:var(--font);
    transition:all .12s ease;
  }
  .chip:hover{color:var(--text);border-color:var(--line-3)}
  .chip.danger{color:var(--danger);border-color:rgba(255,107,107,.3)}
  .send{
    width:32px;height:32px;border-radius:50%;
    background:var(--accent);color:#000;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease, opacity .15s ease;
    flex-shrink:0;
  }
  .send:disabled{opacity:.35;cursor:not-allowed}
  .send:hover:not(:disabled){transform:scale(1.08)}
  .send:active:not(:disabled){transform:scale(.95)}
  .send svg{width:15px;height:15px}

  /* ===== Streaming cursor ===== */
  .cursor{
    display:inline-block;width:7px;height:14px;background:var(--text);
    margin-left:2px;vertical-align:-2px;animation:blink 1s steps(2) infinite;
    border-radius:1px;
  }
  @keyframes blink{50%{opacity:0}}

  /* ===== Scrollbars ===== */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
  ::-webkit-scrollbar-track{background:transparent}
  * {scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>Orby</div>
    </div>
    <button class="new-chat" id="newChat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>
    <div class="side-title">History</div>
    <div class="history" id="history"></div>
    <div class="side-foot">
      <span>Orby v2.0</span>
      <span style="color:var(--ok)">●</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span style="color:var(--text-4);font-size:11px;letter-spacing:.1em;text-transform:uppercase">Model</span>
        <select class="model-select" id="modelSelect">
          <option value="felo-chat">felo-chat (default)</option>
          <option value="scira-default">scira-default</option>
          <option value="scira-gemini-3.1-flash-lite">Gemini 3.1 mini</option>
          <option value="scira-qwen-32b">qwen-32b (casual)</option>
        </select>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="clearBtn">Clear</button>
      </div>
    </div>

    <div class="chat" id="chat">
      <div class="chat-inner" id="chatInner">
        <div class="empty" id="empty">
          <h1>What shall we build?</h1>
          <p>Orby は自律的にツールを呼び出し、うまくいくまで再思考します。</p>
          <div class="suggestions">
            <button class="suggest" data-p="index.html単体でAIオセロを作って">index.html 単体で AI オセロを作って</button>
            <button class="suggest" data-p="今週のAI最新ニュースをWeb検索で3件調べて要約して">今週の AI 最新ニュースを Web 検索で 3 件調べて要約して</button>
            <button class="suggest" data-p="fibonacci(40)をJSで計算して結果を教えて">fibonacci(40) を JS で計算して結果を教えて</button>
            <button class="suggest" data-p="幻想的な夜の東京タワーの画像を生成して">幻想的な夜の東京タワーの画像を生成して</button>
          </div>
        </div>
      </div>
    </div>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Orby にメッセージを送る..." autofocus></textarea>
        <div class="composer-actions">
          <div class="composer-left">
            <span class="composer-hint">⏎ 送信 · ⇧⏎ 改行</span>
          </div>
          <button class="chip danger" id="stopBtn" style="display:none">■ Stop</button>
          <button class="send" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  "use strict";
  // ===================================================================
  // Markdown renderer (safe-enough)
  // ===================================================================
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}

  function renderMarkdown(md){
    if(!md) return "";
    let s = md;
    const codeBlocks = [];
    // Fenced code blocks
    s = s.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_,lang,code)=>{
      codeBlocks.push({lang: lang||"", code});
      return `\u0000CB${codeBlocks.length-1}\u0000`;
    });
    // Escape everything else
    s = escapeHtml(s);
    // Inline code
    s = s.replace(/`([^`\n]+)`/g, (_,c)=>`<code>${c}</code>`);
    // Images (before links)
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_,alt,url)=>`<img src="${url}" alt="${alt}" loading="lazy"/>`);
    // Links — special-case /api/files/xxx → file card
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_,txt,url)=>{
      if(/^\/api\/files\//.test(url)){
        return `<a href="${url}" class="file-card" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ${txt}
        </a>`;
      }
      return `<a href="${url}" target="_blank" rel="noopener">${txt}</a>`;
    });
    // Bold / italic
    s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^\w*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
    // Headings
    s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // HR
    s = s.replace(/^---+$/gm, '<hr/>');
    // Blockquote
    s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    // Unordered lists
    s = s.replace(/(?:^|\n)((?:[-*] .+\n?)+)/g, (m,list)=>{
      const items = list.trim().split(/\n/).map(l=>`<li>${l.replace(/^[-*] /,'')}</li>`).join("");
      return `\n<ul>${items}</ul>`;
    });
    // Ordered lists
    s = s.replace(/(?:^|\n)((?:\d+\. .+\n?)+)/g, (m,list)=>{
      const items = list.trim().split(/\n/).map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join("");
      return `\n<ol>${items}</ol>`;
    });
    // Tables (simple)
    s = s.replace(/((?:^\|.+\|\n)+)/gm, (block)=>{
      const rows = block.trim().split("\n").map(r=>r.slice(1,-1).split("|").map(c=>c.trim()));
      if(rows.length<2) return block;
      const isSep = rows[1].every(c=>/^-+$/.test(c.replace(/:/g,"")));
      if(!isSep) return block;
      const header = rows[0], body = rows.slice(2);
      return `<table><thead><tr>${header.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
    });
    // Paragraphs
    s = s.split(/\n{2,}/).map(p=>{
      const t=p.trim();
      if(!t) return "";
      if(/^<(h\d|ul|ol|pre|img|table|blockquote|hr|\u0000)/i.test(t)) return p;
      return `<p>${p.replace(/\n/g,"<br/>")}</p>`;
    }).join("\n");
    // Restore code blocks
    s = s.replace(/\u0000CB(\d+)\u0000/g, (_,i)=>{
      const {lang,code} = codeBlocks[+i];
      return `<pre><code class="lang-${lang}">${escapeHtml(code)}</code></pre>`;
    });
    return s;
  }

  function stripToolBlocks(s){
    return s.replace(/```tool\s*[\s\S]*?```/g,"").trim();
  }

  // ===================================================================
  // State
  // ===================================================================
  const state = {
    messages: [],
    currentModel: "felo-chat",
    running: false,
    abortCtl: null,
    history: JSON.parse(localStorage.getItem("orby.history")||"[]"),
    activeId: null,
  };

  const $chat        = document.getElementById("chat");
  const $chatInner   = document.getElementById("chatInner");
  const $empty       = document.getElementById("empty");
  const $input       = document.getElementById("input");
  const $sendBtn     = document.getElementById("sendBtn");
  const $stopBtn     = document.getElementById("stopBtn");
  const $modelSel    = document.getElementById("modelSelect");
  const $newChat     = document.getElementById("newChat");
  const $clearBtn    = document.getElementById("clearBtn");
  const $historyEl   = document.getElementById("history");

  $modelSel.addEventListener("change", () => state.currentModel = $modelSel.value);

  // Auto-grow textarea
  function autoGrow(){
    $input.style.height="auto";
    $input.style.height = Math.min($input.scrollHeight, 200)+"px";
  }
  $input.addEventListener("input", autoGrow);
  $input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey && !e.isComposing){
      e.preventDefault(); send();
    }
  });
  $sendBtn.addEventListener("click", send);
  $stopBtn.addEventListener("click", ()=>{
    if(state.abortCtl) state.abortCtl.abort();
  });
  document.querySelectorAll(".suggest").forEach(b=>{
    b.addEventListener("click", ()=>{ $input.value = b.dataset.p; autoGrow(); send(); });
  });
  $newChat.addEventListener("click", resetConversation);
  $clearBtn.addEventListener("click", resetConversation);

  function resetConversation(){
    state.messages = [];
    state.activeId = null;
    $chatInner.innerHTML="";
    $chatInner.appendChild($empty);
    $empty.style.display="";
    renderHistory();
    $input.focus();
  }

  function renderHistory(){
    $historyEl.innerHTML="";
    state.history.slice().reverse().forEach(h=>{
      const el=document.createElement("div");
      el.className="history-item"+(h.id===state.activeId?" active":"");
      el.textContent = h.title;
      el.title = h.title;
      el.addEventListener("click", ()=>loadHistory(h.id));
      $historyEl.appendChild(el);
    });
  }
  function persistHistory(){
    localStorage.setItem("orby.history", JSON.stringify(state.history.slice(-50)));
  }
  function loadHistory(id){
    const item = state.history.find(x=>x.id===id);
    if(!item) return;
    state.activeId = id;
    state.messages = item.messages.slice();
    $chatInner.innerHTML="";
    $empty.style.display="none";
    item.messages.forEach(m=>{
      if(m.role==="user") addUserBubble(m.content);
      else if(m.role==="assistant") {
        const {bubble} = addAssistantBubble();
        bubble.innerHTML = renderMarkdown(stripToolBlocks(m.content));
      }
    });
    renderHistory();
    scrollBottom();
  }
  function saveActiveToHistory(){
    if(state.messages.length===0) return;
    const firstUser = state.messages.find(m=>m.role==="user");
    const title = (firstUser?.content||"Untitled").slice(0,50).replace(/\n/g," ");
    if(!state.activeId){
      state.activeId = "c_"+Date.now();
      state.history.push({id:state.activeId, title, messages: state.messages.slice()});
    } else {
      const h = state.history.find(x=>x.id===state.activeId);
      if(h){ h.messages = state.messages.slice(); h.title = title; }
    }
    persistHistory(); renderHistory();
  }
  renderHistory();

  // ===================================================================
  // UI builders
  // ===================================================================
  function addUserBubble(text){
    $empty.style.display="none";
    const msg = document.createElement("div");
    msg.className="msg user";
    msg.innerHTML = `<div class="role">You</div><div class="bubble"></div>`;
    msg.querySelector(".bubble").textContent = text;
    $chatInner.appendChild(msg);
    scrollBottom();
    return msg;
  }
  function addAssistantBubble(){
    $empty.style.display="none";
    const msg = document.createElement("div");
    msg.className="msg assistant";
    msg.innerHTML = `<div class="role">Orby</div><div class="bubble"></div>`;
    const bubble = msg.querySelector(".bubble");
    $chatInner.appendChild(msg);
    scrollBottom();
    return { msg, bubble };
  }
  function addStatus(text){
    const pill = document.createElement("div");
    pill.className="status-pill";
    pill.innerHTML = `<div class="spinner"></div><span>${escapeHtml(text)}</span>`;
    $chatInner.appendChild(pill);
    scrollBottom();
    return pill;
  }
  function updateStatus(pill, text){
    if(pill && pill.querySelector("span")) pill.querySelector("span").textContent = text;
  }
  function addToolRun(id, tool, args){
    const el = document.createElement("div");
    el.className="tool-run running open";
    el.dataset.id = id;
    el.innerHTML = `
      <div class="tool-head">
        <div class="tool-dot"></div>
        <div class="tool-name">${escapeHtml(tool)}</div>
        <div class="tool-meta">running…</div>
        <div class="caret"></div>
      </div>
      <div class="tool-body">
        <div class="tool-section">
          <div class="tool-section-label">args</div>
          <pre>${escapeHtml(JSON.stringify(args,null,2))}</pre>
        </div>
      </div>
    `;
    el.querySelector(".tool-head").addEventListener("click",()=>{
      el.classList.toggle("open");
    });
    $chatInner.appendChild(el);
    scrollBottom();
    return el;
  }
  function completeToolRun(el, result, ms, tool){
    el.classList.remove("running");
    const hasError = result && (result.error || result.ok === false);
    if(hasError) el.classList.add("error"); else el.classList.add("done");
    el.querySelector(".tool-meta").textContent = (ms!=null?`${ms}ms`:"") + (hasError?" · error":" · ok");
    const body = el.querySelector(".tool-body");
    const sec = document.createElement("div");
    sec.className="tool-section";

    // Custom pretty views per tool
    if(tool === "image_generate" && result && result.url){
      sec.innerHTML = `<div class="tool-section-label">generated image</div>
        <img src="${result.url}" alt="" style="max-width:100%;border-radius:8px;border:1px solid var(--line);margin-top:4px"/>
        <pre style="margin-top:8px">${escapeHtml(JSON.stringify(result,null,2))}</pre>`;
    }
    else if(tool === "file_upload" && result && result.download_url){
      sec.innerHTML = `<div class="tool-section-label">file</div>
        <a href="${result.download_url}" class="file-card" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ${escapeHtml(result.filename||"download")} · ${((result.size||0)/1024).toFixed(1)}KB
        </a>
        <pre style="margin-top:8px">${escapeHtml(JSON.stringify({...result, content:undefined},null,2))}</pre>`;
    }
    else if(tool === "web_search" && result && Array.isArray(result.results)){
      const items = result.results.map(r=>`
        <div class="tool-search-item">
          <a href="${r.url}" target="_blank" rel="noopener">${escapeHtml(r.title||r.url)}</a>
          <div class="url">${escapeHtml(r.url)}</div>
          <div class="snip">${escapeHtml((r.snippet||"").slice(0,220))}</div>
        </div>
      `).join("");
      sec.innerHTML = `<div class="tool-section-label">${result.results.length} results${result.source?` · via ${escapeHtml(result.source)}`:""}</div>
        <div class="tool-search-preview">${items || '<div class="snip" style="color:var(--text-3)">(no results)</div>'}</div>`;
    }
    else if(tool === "html_fetch" && result && result.text){
      const preview = result.text.slice(0, 2000);
      sec.innerHTML = `<div class="tool-section-label">${escapeHtml(result.title||"page")} · ${result.length||0} chars</div>
        <pre>${escapeHtml(preview)}${result.text.length>2000?"\n... (truncated)":""}</pre>`;
    }
    else if(tool === "js_exec"){
      const parts = [];
      if(result.logs && result.logs.length) parts.push(`<div class="tool-section-label">console</div><pre>${escapeHtml(result.logs.join("\n"))}</pre>`);
      if(result.result != null) parts.push(`<div class="tool-section-label" style="margin-top:8px">return</div><pre>${escapeHtml(String(result.result))}</pre>`);
      if(result.error) parts.push(`<div class="tool-section-label" style="margin-top:8px;color:var(--danger)">error</div><pre>${escapeHtml(String(result.error))}</pre>`);
      sec.innerHTML = parts.join("") || `<pre>${escapeHtml(JSON.stringify(result,null,2))}</pre>`;
    }
    else {
      const j = JSON.stringify(result, null, 2);
      sec.innerHTML = `<div class="tool-section-label">result</div><pre>${escapeHtml(j.length>4000?j.slice(0,4000)+"\n... (truncated)":j)}</pre>`;
    }
    body.appendChild(sec);
    scrollBottom();
  }

  function shouldAutoScroll(){
    // Autoscroll only if user is near the bottom
    return ($chat.scrollHeight - $chat.scrollTop - $chat.clientHeight) < 100;
  }
  function scrollBottom(force){
    if(!force && !shouldAutoScroll()) return;
    requestAnimationFrame(()=>{
      $chat.scrollTop = $chat.scrollHeight;
    });
  }

  // ===================================================================
  // Send / stream (SSE)
  // ===================================================================
  async function send(){
    if(state.running) return;
    const text = $input.value.trim();
    if(!text) return;
    $input.value=""; autoGrow();

    addUserBubble(text);
    state.messages.push({role:"user", content:text});

    state.running = true;
    $sendBtn.disabled = true;
    $stopBtn.style.display="inline-block";

    let currentBubble = null;
    let currentMsg = null;
    let assistantRawBuffer = "";
    const toolElsById = new Map();
    const statusPill = addStatus("thinking…");

    function ensureBubble(){
      if(!currentBubble){
        const b = addAssistantBubble();
        currentBubble = b.bubble; currentMsg = b.msg;
        assistantRawBuffer = "";
      }
    }
    function finalizeBubble(){
      if(currentBubble){
        const clean = stripToolBlocks(assistantRawBuffer);
        if(clean.trim()){
          currentBubble.innerHTML = renderMarkdown(clean);
        } else {
          // Hide bubble that had only tool calls
          currentMsg.style.display = "none";
        }
      }
      currentBubble = null; currentMsg = null; assistantRawBuffer = "";
    }

    try {
      state.abortCtl = new AbortController();
      const res = await fetch("/api/agent", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          messages: state.messages,
          model: state.currentModel,
        }),
        signal: state.abortCtl.signal,
      });
      if(!res.ok || !res.body) throw new Error("HTTP "+res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      let finalText = "";

      function handleEvent(event, data){
        try{ data = JSON.parse(data); }catch(_){ return; }

        if(event==="round"){
          updateStatus(statusPill, `round ${data.round} · reasoning…`);
          // On new round after tool calls, finalize previous bubble if any
          if(data.round > 1 && currentBubble) finalizeBubble();
        }
        else if(event==="assistant_start"){
          ensureBubble();
        }
        else if(event==="assistant_delta"){
          ensureBubble();
          assistantRawBuffer += data.text;
          const display = stripToolBlocks(assistantRawBuffer);
          currentBubble.innerHTML = renderMarkdown(display) + (display.trim()?`<span class="cursor"></span>`:"");
          scrollBottom();
        }
        else if(event==="assistant_end"){
          // Don't finalize yet — may be followed by tool calls in same round
        }
        else if(event==="tools_start"){
          finalizeBubble();
          updateStatus(statusPill, `${data.count} tool${data.count>1?"s":""} running…`);
        }
        else if(event==="tool_call"){
          const el = addToolRun(data.id, data.tool, data.args||{});
          toolElsById.set(data.id, el);
        }
        else if(event==="tool_result"){
          const el = toolElsById.get(data.id);
          if(el) completeToolRun(el, data.result, data.elapsed_ms, data.tool);
        }
        else if(event==="final"){
          finalText = data.text || "";
          finalizeBubble();
          if(assistantRawBuffer) state.messages.push({role:"assistant", content: assistantRawBuffer});
          else if(finalText) state.messages.push({role:"assistant", content: finalText});
        }
        else if(event==="error"){
          const p = addStatus("⚠ " + data.message);
          p.style.borderColor = "rgba(255,107,107,.3)";
          p.style.color = "var(--danger)";
        }
        else if(event==="done"){
          try{ statusPill.remove(); }catch(_){}
        }
      }

      while(true){
        const {value, done} = await reader.read();
        if(done) break;
        buf += decoder.decode(value, {stream:true});
        let sep;
        while((sep = buf.indexOf("\n\n")) >= 0){
          const raw = buf.slice(0, sep);
          buf = buf.slice(sep+2);
          const lines = raw.split("\n");
          let event="message", data="";
          for(const ln of lines){
            if(ln.startsWith("event:")) event = ln.slice(6).trim();
            else if(ln.startsWith("data:")) data += ln.slice(5).trim();
          }
          if(data) handleEvent(event, data);
        }
      }
    } catch(e) {
      if(e.name!=="AbortError"){
        const p = addStatus("⚠ " + (e.message||e));
        p.style.borderColor = "rgba(255,107,107,.3)";
        p.style.color = "var(--danger)";
      }
    } finally {
      state.running = false;
      state.abortCtl = null;
      $sendBtn.disabled = false;
      $stopBtn.style.display="none";
      try{ statusPill.remove(); }catch(_){}
      // Final safety: if there's an unfinalized bubble, finalize it
      if(currentBubble) {
        const clean = stripToolBlocks(assistantRawBuffer);
        if(clean.trim()) currentBubble.innerHTML = renderMarkdown(clean);
        else if(currentMsg) currentMsg.style.display = "none";
      }
      saveActiveToHistory();
      scrollBottom(true);
      $input.focus();
    }
  }
</script>
