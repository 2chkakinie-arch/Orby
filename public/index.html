<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Orby</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23a78bfa'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='38' fill='url(%23g)'/%3E%3Ccircle cx='38' cy='40' r='10' fill='white' opacity='.9'/%3E%3C/svg%3E" />
<style>
  :root{
    /* ─────────── Palette ─────────── */
    --bg:#08080b;
    --bg-1:#0d0d12;
    --bg-2:#12121a;
    --bg-3:#1a1a24;
    --bg-4:#22222e;
    --line:rgba(255,255,255,.07);
    --line-2:rgba(255,255,255,.13);
    --line-3:rgba(255,255,255,.22);
    --text:#f4f4f6;
    --text-2:#a4a4b0;
    --text-3:#6e6e7a;
    --text-4:#48484f;

    /* Signature accent — violet/indigo */
    --accent:#a78bfa;
    --accent-2:#8b5cf6;
    --accent-3:#7c3aed;
    --accent-glow:rgba(167,139,250,.18);
    --accent-dim:rgba(167,139,250,.08);

    --ok:#4ade80;
    --warn:#fbbf24;
    --danger:#f87171;
    --info:#60a5fa;

    --radius:14px;
    --radius-sm:10px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--font); background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    overflow:hidden; letter-spacing:-.005em;
  }

  /* ─────────── Layout ─────────── */
  .app{ display:grid; grid-template-columns:264px 1fr; height:100dvh; }
  @media (max-width:820px){ .app{grid-template-columns:1fr} .sidebar{display:none} }

  /* ─────────── Sidebar ─────────── */
  .sidebar{
    background:var(--bg-1);
    border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:18px 14px; gap:14px; min-height:0;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding:6px 6px; text-decoration:none; color:var(--text);
  }
  .logo{
    width:32px;height:32px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .brand-name{
    font-size:19px; font-weight:700; letter-spacing:-.03em;
    background:linear-gradient(135deg, #fff 0%, #d4d4d8 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .new-chat{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 12px; border-radius:var(--radius-sm);
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
    color:#fff; font-weight:600; font-size:13.5px;
    border:none; cursor:pointer;
    transition:transform .15s, box-shadow .2s, filter .15s;
    font-family:var(--font);
    box-shadow:0 6px 20px rgba(124,58,237,.25);
  }
  .new-chat:hover{filter:brightness(1.1);box-shadow:0 8px 24px rgba(124,58,237,.35)}
  .new-chat:active{transform:scale(.98)}
  .side-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 8px;margin-top:6px;
  }
  .side-title{
    font-size:10.5px; letter-spacing:.14em; color:var(--text-4);
    text-transform:uppercase; font-weight:600;
  }
  .side-clear-all{
    background:transparent;border:none;
    color:var(--text-4);cursor:pointer;font-size:11px;
    padding:2px 6px;border-radius:5px;font-family:var(--font);
    transition:color .12s, background .12s;
  }
  .side-clear-all:hover{color:var(--danger);background:rgba(248,113,113,.08)}
  .history{
    flex:1; overflow-y:auto;
    display:flex; flex-direction:column; gap:1px;
    padding:0 2px; min-height:0;
  }
  .history-item{
    padding:8px 10px; border-radius:8px;
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    color:var(--text-2); font-size:13px;
    cursor:pointer;
    transition:background .12s, color .12s;
    position:relative;
  }
  .history-item:hover{background:var(--accent-dim);color:var(--text)}
  .history-item.active{background:rgba(167,139,250,.12);color:var(--text)}
  .history-item .title{flex:1;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;min-width:0}
  .history-item .del{
    opacity:0;background:transparent;border:none;color:var(--text-3);
    cursor:pointer;padding:2px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .12s, color .12s;
  }
  .history-item:hover .del{opacity:1}
  .history-item .del:hover{color:var(--danger)}
  .history-item .del svg{width:12px;height:12px}
  .side-foot{ padding:8px; font-size:11px; color:var(--text-4);
    border-top:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center; }
  .side-foot .status-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}

  /* ─────────── Main ─────────── */
  .main{ display:flex; flex-direction:column; height:100dvh; min-width:0; position:relative; }
  .topbar{
    height:54px; flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid var(--line);
    background:rgba(8,8,11,.85);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    z-index:5;
  }
  .topbar-left{display:flex;align-items:center;gap:10px}
  .topbar-brand-mobile{display:none;align-items:center;gap:8px;font-weight:700;font-size:16px;letter-spacing:-.02em}
  @media (max-width:820px){.topbar-brand-mobile{display:flex}}

  /* Model picker button */
  .model-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--bg-2); color:var(--text);
    border:1px solid var(--line-2); border-radius:9px;
    padding:6px 10px 6px 12px; font-size:12.5px; font-family:var(--font);
    cursor:pointer; outline:none;
    transition:all .12s;
  }
  .model-btn:hover{border-color:var(--line-3);background:var(--bg-3)}
  .model-btn .model-icon{width:14px;height:14px;color:var(--accent)}
  .model-btn .model-name{font-weight:500}
  .model-btn .chevron{width:11px;height:11px;color:var(--text-3);margin-left:2px}

  .top-actions{display:flex;gap:8px;align-items:center}
  .icon-btn{
    background:transparent; color:var(--text-2);
    border:1px solid var(--line); border-radius:8px;
    padding:6px 10px; font-size:12px; cursor:pointer;
    font-family:var(--font); transition:all .12s;
  }
  .icon-btn:hover{color:var(--text);border-color:var(--line-3);background:var(--bg-2)}

  /* ─────────── Chat ─────────── */
  .chat{ flex:1; overflow-y:auto; min-height:0; scroll-behavior:smooth; padding-top:26px; }
  .chat-inner{
    max-width:800px; margin:0 auto; padding:0 22px;
    display:flex; flex-direction:column; gap:20px;
    padding-bottom:200px; /* ⭐ guaranteed clearance under composer */
  }
  .empty{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:calc(100dvh - 260px); text-align:center; gap:16px; padding-bottom:40px;
  }
  .empty-logo{
    width:64px;height:64px;margin-bottom:6px;
    filter:drop-shadow(0 8px 24px rgba(124,58,237,.35));
  }
  .empty h1{ font-size:36px; font-weight:700; letter-spacing:-.028em; margin:0;
    background:linear-gradient(135deg,#fff 0%, #c4b5fd 50%, #a78bfa 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .empty p{color:var(--text-3);font-size:14px;margin:0;max-width:400px}
  .suggestions{ display:grid; grid-template-columns:1fr 1fr; gap:8px;
    margin-top:14px; max-width:600px; width:100%; }
  .suggest{
    text-align:left; padding:13px 15px; border-radius:12px;
    background:var(--bg-2); border:1px solid var(--line);
    color:var(--text-2); cursor:pointer; font-size:13px; line-height:1.5;
    transition:all .18s; font-family:var(--font);
    display:flex;align-items:flex-start;gap:10px;
  }
  .suggest:hover{background:var(--bg-3);border-color:var(--accent);color:var(--text);transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(0,0,0,.3), 0 0 0 1px var(--accent-dim)}
  .suggest .emoji{font-size:16px;line-height:1;flex-shrink:0;margin-top:1px}
  @media (max-width:620px){.suggestions{grid-template-columns:1fr}}

  /* ─────────── Messages ─────────── */
  .msg{display:flex;flex-direction:column;gap:6px;animation:fadeIn .28s cubic-bezier(.4,0,.2,1)}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg .role{
    font-size:10.5px; letter-spacing:.12em; color:var(--text-4);
    text-transform:uppercase; font-weight:700;
    display:flex;align-items:center;gap:6px;
  }
  .msg.assistant .role::before{
    content:""; width:8px;height:8px;border-radius:50%;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
    box-shadow:0 0 8px var(--accent-glow);
  }
  .msg.user{align-items:flex-end}
  .msg.user .bubble{
    background:var(--bg-3); border:1px solid var(--line);
    padding:11px 14px; border-radius:var(--radius);
    max-width:82%; font-size:14.5px; line-height:1.6;
    white-space:pre-wrap; word-wrap:break-word;
  }
  .msg.user .attachments-in-msg{
    display:flex;flex-direction:column;gap:6px;align-items:flex-end;margin-bottom:2px;
  }
  .msg.assistant .bubble{ line-height:1.72; font-size:14.5px; color:var(--text); word-wrap:break-word; }
  .bubble p{margin:.5em 0} .bubble p:first-child{margin-top:0} .bubble p:last-child{margin-bottom:0}
  .bubble h1,.bubble h2,.bubble h3{ margin:1.2em 0 .5em; font-weight:600; letter-spacing:-.015em; }
  .bubble h1{font-size:1.35em} .bubble h2{font-size:1.2em} .bubble h3{font-size:1.08em}
  .bubble pre{
    background:#04040a; border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; overflow:auto;
    font-family:var(--mono); font-size:12.5px; line-height:1.55; margin:.6em 0;
  }
  .bubble code{ font-family:var(--mono); font-size:.9em;
    background:rgba(167,139,250,.1); color:#d4c1ff;
    padding:1.5px 5px; border-radius:4px; }
  .bubble pre code{background:none;padding:0;font-size:1em;color:var(--text)}
  .bubble a{color:var(--accent);text-decoration:underline;text-decoration-color:rgba(167,139,250,.4);text-underline-offset:2px}
  .bubble a:hover{text-decoration-color:var(--accent)}
  .bubble img{max-width:100%;border-radius:10px;border:1px solid var(--line);margin:.4em 0}
  .bubble ul,.bubble ol{padding-left:1.4em;margin:.5em 0}
  .bubble li{margin:.2em 0}
  .bubble table{border-collapse:collapse;margin:.6em 0;font-size:.94em;display:block;overflow-x:auto;max-width:100%}
  .bubble th,.bubble td{border:1px solid var(--line);padding:6px 10px;text-align:left}
  .bubble th{background:var(--bg-2)}
  .bubble hr{border:none;border-top:1px solid var(--line);margin:1em 0}
  .bubble blockquote{border-left:2px solid var(--accent);padding-left:14px;color:var(--text-2);margin:.6em 0}

  /* ─────────── Tool cards ─────────── */
  .tool-card{
    display:flex; align-items:center; gap:12px;
    padding:11px 13px; border:1px solid var(--line); border-radius:12px;
    background:var(--bg-1); cursor:pointer; user-select:none;
    animation:fadeIn .25s ease;
    transition:all .15s;
    max-width:100%;
  }
  .tool-card:hover{background:var(--bg-2);border-color:var(--line-2);transform:translateY(-1px)}
  .tool-card.running{border-color:rgba(251,191,36,.28)}
  .tool-card.done{border-color:var(--line)}
  .tool-card.error{border-color:rgba(248,113,113,.3)}
  .tool-icon{
    width:34px;height:34px;border-radius:10px;
    background:linear-gradient(135deg, rgba(167,139,250,.15) 0%, rgba(124,58,237,.08) 100%);
    border:1px solid rgba(167,139,250,.18);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .tool-icon svg{width:17px;height:17px;color:var(--accent)}
  .tool-card.done .tool-icon{border-color:rgba(74,222,128,.2);background:linear-gradient(135deg, rgba(74,222,128,.12) 0%, rgba(74,222,128,.04) 100%)}
  .tool-card.done .tool-icon svg{color:var(--ok)}
  .tool-card.error .tool-icon{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}
  .tool-card.error .tool-icon svg{color:var(--danger)}
  .tool-body-mini{flex:1;min-width:0}
  .tool-title-row{display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .tool-name{
    font-family:var(--mono); font-size:12px; font-weight:600;
    color:var(--text); letter-spacing:-.005em;
  }
  .tool-status{
    font-size:10.5px; font-family:var(--mono);
    padding:1.5px 7px; border-radius:5px;
  }
  .tool-card.running .tool-status{color:var(--warn);background:rgba(251,191,36,.1)}
  .tool-card.done .tool-status{color:var(--ok);background:rgba(74,222,128,.08)}
  .tool-card.error .tool-status{color:var(--danger);background:rgba(248,113,113,.1)}
  .tool-summary{
    font-size:12.5px; color:var(--text-2); line-height:1.4;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .tool-spinner{ width:6px;height:6px;border-radius:50%;background:var(--warn);
    display:inline-block;margin-right:5px;vertical-align:middle;
    animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.8)}}
  .tool-expand-hint{
    color:var(--text-4); flex-shrink:0;
    display:flex; align-items:center;
  }
  .tool-expand-hint svg{width:12px;height:12px}

  /* ─────────── File preview card (agent-generated file) inline ─────────── */
  .file-card-inline{
    display:flex;align-items:center;gap:12px;
    padding:12px 14px; border:1px solid var(--line); border-radius:12px;
    background:var(--bg-1); text-decoration:none; color:var(--text);
    margin:.4em 0; transition:all .15s;
  }
  .file-card-inline:hover{border-color:var(--accent);background:var(--bg-2)}
  .file-card-inline .fc-icon{
    width:36px;height:36px;border-radius:9px;
    background:linear-gradient(135deg, rgba(167,139,250,.15), rgba(124,58,237,.08));
    border:1px solid rgba(167,139,250,.2);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .file-card-inline .fc-icon svg{width:16px;height:16px;color:var(--accent)}
  .file-card-inline .fc-body{flex:1;min-width:0}
  .file-card-inline .fc-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .file-card-inline .fc-meta{font-size:11px;color:var(--text-3);font-family:var(--mono);margin-top:2px}

  /* ─────────── Status pill ─────────── */
  .status-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:999px;
    background:var(--bg-1); border:1px solid var(--line);
    font-size:11.5px; color:var(--text-2); align-self:flex-start;
    font-family:var(--mono); animation:fadeIn .2s ease;
  }
  .status-pill .spin{ width:6px;height:6px;border-radius:50%;background:var(--accent);
    animation:pulse 1.2s ease-in-out infinite; box-shadow:0 0 6px var(--accent-glow); }

  /* ─────────── Composer ─────────── */
  .composer-wrap{
    position:absolute; left:0; right:0; bottom:0;
    padding:22px 22px 22px;
    background:linear-gradient(180deg, rgba(8,8,11,0) 0%, rgba(8,8,11,.55) 25%, rgba(8,8,11,.9) 60%, var(--bg) 100%);
    pointer-events:none; z-index:20;
  }
  .composer{
    max-width:800px; margin:0 auto;
    background:var(--bg-3); border:1px solid var(--line-2);
    border-radius:22px; padding:6px 8px 6px 14px;
    display:flex; flex-direction:column; gap:0;
    pointer-events:auto;
    box-shadow:0 16px 60px rgba(0,0,0,.55), 0 1px 0 rgba(255,255,255,.04) inset;
    transition:border-color .2s, box-shadow .2s;
  }
  .composer:focus-within{
    border-color:rgba(167,139,250,.45);
    box-shadow:0 16px 60px rgba(0,0,0,.6), 0 0 0 3px var(--accent-dim);
  }
  .attachments-tray{
    display:flex;flex-wrap:wrap;gap:6px;padding:6px 0 2px;
  }
  .attach-chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 8px 5px 8px; border-radius:8px;
    background:var(--bg-2); border:1px solid var(--line);
    font-size:11.5px;color:var(--text-2);
    max-width:220px;
  }
  .attach-chip .icn{width:12px;height:12px;color:var(--accent);flex-shrink:0}
  .attach-chip .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .attach-chip .remove{
    width:16px;height:16px;border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    background:transparent;border:none;cursor:pointer;color:var(--text-3);
    transition:all .12s;
  }
  .attach-chip .remove:hover{background:rgba(248,113,113,.15);color:var(--danger)}
  .attach-chip .remove svg{width:10px;height:10px}
  .composer textarea{
    background:transparent; border:none; outline:none; color:var(--text);
    font-family:var(--font); font-size:14.5px; line-height:1.55;
    resize:none; padding:9px 4px 4px; max-height:200px; width:100%;
  }
  .composer textarea::placeholder{color:var(--text-4)}
  .composer-actions{
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 2px 4px; gap:8px;
  }
  .composer-left{display:flex;align-items:center;gap:6px}
  .composer-right{display:flex;align-items:center;gap:8px}
  .composer-hint{font-size:11px;color:var(--text-4);font-family:var(--mono)}
  .attach-btn{
    width:30px;height:30px;border-radius:50%;
    background:transparent;border:1px solid var(--line);color:var(--text-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:all .12s;
  }
  .attach-btn:hover{border-color:var(--line-3);color:var(--text);background:var(--bg-2)}
  .attach-btn svg{width:14px;height:14px}
  .chip.danger{color:var(--danger);border:1px solid rgba(248,113,113,.3);
    background:transparent;border-radius:999px;padding:5px 11px;font-size:11.5px;cursor:pointer;font-family:var(--font)}
  .chip.danger:hover{background:rgba(248,113,113,.08)}
  .send{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg, var(--accent) 0%, var(--accent-3) 100%);
    color:#fff; border:none; cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s, filter .15s, box-shadow .2s;
    flex-shrink:0;
    box-shadow:0 6px 18px rgba(124,58,237,.35);
  }
  .send:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
  .send:hover:not(:disabled){transform:scale(1.06);filter:brightness(1.08)}
  .send:active:not(:disabled){transform:scale(.94)}
  .send svg{width:15px;height:15px}

  /* ─────────── Cursor blink ─────────── */
  .cursor{ display:inline-block; width:7px; height:14px; background:var(--accent);
    margin-left:2px; vertical-align:-2px; animation:blink 1s steps(2) infinite;
    border-radius:1px; box-shadow:0 0 6px var(--accent-glow); }
  @keyframes blink{50%{opacity:0}}

  /* ─────────── Scrollbars ─────────── */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
  ::-webkit-scrollbar-track{background:transparent}
  *{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}

  /* ─────────── Modal (tool detail / model picker) ─────────── */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.75);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    z-index:1000; display:none;
    align-items:center; justify-content:center; padding:20px;
    animation:fadeIn .2s ease;
  }
  .modal-backdrop.open{display:flex}
  .modal{
    background:var(--bg-1); border:1px solid var(--line-2);
    border-radius:18px; width:100%; max-width:900px; max-height:90vh;
    display:flex; flex-direction:column; overflow:hidden;

// ═══════════════════════════════════════════════════════════════
// Markdown
// ═══════════════════════════════════════════════════════════════
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}

function renderMarkdown(md){
  if(!md) return "";
  let s = md;
  const codeBlocks = [];
  s = s.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_,lang,code)=>{
    codeBlocks.push({lang: lang||"", code});
    return `\u0000CB${codeBlocks.length-1}\u0000`;
  });
  s = escapeHtml(s);
  s = s.replace(/`([^`\n]+)`/g, (_,c)=>`<code>${c}</code>`);
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_,alt,url)=>`<img src="${url}" alt="${alt}" loading="lazy"/>`);
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_,txt,url)=>{
    if(/^\/api\/files\//.test(url)){
      // Extract just id from url like /api/files/xxx
      return `<a href="${url}" class="file-card-inline" target="_blank" rel="noopener" data-file-url="${url}">
        <div class="fc-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
        <div class="fc-body">
          <div class="fc-name">${txt}</div>
          <div class="fc-meta">クリックしてダウンロード / プレビュー</div>
        </div>
      </a>`;
    }
    return `<a href="${url}" target="_blank" rel="noopener">${txt}</a>`;
  });
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^\w*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  s = s.replace(/^---+$/gm, '<hr/>');
  s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  s = s.replace(/(?:^|\n)((?:[-*] .+\n?)+)/g, (m,list)=>{
    const items = list.trim().split(/\n/).map(l=>`<li>${l.replace(/^[-*] /,'')}</li>`).join("");
    return `\n<ul>${items}</ul>`;
  });
  s = s.replace(/(?:^|\n)((?:\d+\. .+\n?)+)/g, (m,list)=>{
    const items = list.trim().split(/\n/).map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join("");
    return `\n<ol>${items}</ol>`;
  });
  s = s.replace(/((?:^\|.+\|\n)+)/gm, (block)=>{
    const rows = block.trim().split("\n").map(r=>r.slice(1,-1).split("|").map(c=>c.trim()));
    if(rows.length<2) return block;
    const isSep = rows[1].every(c=>/^-+$/.test(c.replace(/:/g,"")));
    if(!isSep) return block;
    const header = rows[0], body = rows.slice(2);
    return `<table><thead><tr>${header.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${body.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
  });
  s = s.split(/\n{2,}/).map(p=>{
    const t=p.trim();
    if(!t) return "";
    if(/^<(h\d|ul|ol|pre|img|table|blockquote|hr|a\s|\u0000)/i.test(t)) return p;
    return `<p>${p.replace(/\n/g,"<br/>")}</p>`;
  }).join("\n");
  s = s.replace(/\u0000CB(\d+)\u0000/g, (_,i)=>{
    const {lang,code} = codeBlocks[+i];
    return `<pre><code class="lang-${lang}">${escapeHtml(code)}</code></pre>`;
  });
  return s;
}
function stripToolBlocks(s){ return s.replace(/```tool\s*[\s\S]*?```/g,"").trim(); }

function renderHistory(){
  $historyEl.innerHTML="";
  state.history.slice().reverse().forEach(h=>{
    const el=document.createElement("div");
    el.className="history-item"+(h.id===state.activeId?" active":"");
    el.innerHTML = `
      <div class="title">${escapeHtml(h.title)}</div>
      <button class="del" title="Delete" data-id="${h.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"/></svg>
      </button>`;
    el.addEventListener("click", (e)=>{
      if(e.target.closest(".del")){
        e.stopPropagation();
        deleteHistory(h.id);
        return;
      }
      loadHistory(h.id);
    });
    $historyEl.appendChild(el);
  });
}
function deleteHistory(id){
  state.history = state.history.filter(x=>x.id!==id);
  if(state.activeId === id){ state.activeId=null; resetConversation(); }
  persistHistory(); renderHistory();
}
function persistHistory(){ localStorage.setItem("orby.history", JSON.stringify(state.history.slice(-50))); }
function loadHistory(id){
  const item = state.history.find(x=>x.id===id);
  if(!item) return;
  state.activeId = id;
  state.messages = item.messages.slice();
  $chatInner.innerHTML="";
  $empty.style.display="none";
  item.messages.forEach(m=>{
    if(m.role==="user") addUserBubble(m.content);
    else if(m.role==="assistant"){
      const {bubble} = addAssistantBubble();
      bubble.innerHTML = renderMarkdown(stripToolBlocks(m.content));
    }
  });
  renderHistory(); scrollBottom(true);
}
function saveActiveToHistory(){
  if(state.messages.length===0) return;
  const firstUser = state.messages.find(m=>m.role==="user");
  const title = (firstUser?.content||"Untitled").slice(0,50).replace(/\n/g," ");
  if(!state.activeId){
    state.activeId = "c_"+Date.now();
    state.history.push({id:state.activeId, title, messages: state.messages.slice()});
  } else {
    const h = state.history.find(x=>x.id===state.activeId);
    if(h){ h.messages = state.messages.slice(); h.title = title; }
  }
  persistHistory(); renderHistory();
}

function handleFileSelect(e){
  const files = Array.from(e.target.files || []);
  if(files.length) uploadFiles(files);
  $fileInput.value = "";
}

async function uploadFiles(files){
  for(const file of files){
    if(file.size > 5 * 1024 * 1024){
      alert(`${file.name} は 5MB を超えています。`);
      continue;
    }
    try {
      const content = await readFileText(file);
      const res = await fetch("/api/upload", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ filename: file.name, content, mime: file.type })
      });
      if(!res.ok) throw new Error("upload failed");
      const j = await res.json();
      state.attachments.push(j);
      renderAttachments();
    } catch(err){
      alert(`アップロード失敗: ${file.name}\n${err.message}`);
    }
  }
}
function readFileText(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = ()=>reject(reader.error);
    reader.readAsText(file);
  });
}
function renderAttachments(){
  if(state.attachments.length === 0){
    $attachTray.style.display = "none";
    $attachTray.innerHTML = "";
    return;
  }
  $attachTray.style.display = "flex";
  $attachTray.innerHTML = state.attachments.map(a=>`
    <div class="attach-chip">
      <svg class="icn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="name">${escapeHtml(a.filename)}</span>
      <button class="remove" data-id="${a.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
  `).join("");
  $attachTray.querySelectorAll(".remove").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const id = btn.dataset.id;
      state.attachments = state.attachments.filter(a=>a.id!==id);
      fetch(`/api/upload/${id}`, {method:"DELETE"}).catch(()=>{});
      renderAttachments();
    });
  });
}

function toolSummary(tool, args){
  switch(tool){
    case "web_search":     return args.query ? `"${args.query}"` : "";
    case "html_fetch":     return args.url ? args.url.replace(/^https?:\/\/(www\.)?/,"") : "";
    case "js_exec":        return (args.code||"").slice(0,60).replace(/\n/g," ");
    case "load_skill":     return Array.isArray(args.name) ? args.name.join(", ") : (args.name || args.skill || "");
    case "parallel_think": return (args.prompt||"").slice(0,60).replace(/\n/g," ");
    case "image_generate": return (args.prompt||"").slice(0,60).replace(/\n/g," ");
    case "file_upload":    return args.filename || "";
    case "read_file":      return args.attachment_id || args.id || "";
    case "edit_file":      return args.file_id || "";
    case "extract_data":   return args.format || "";
    case "summarize":      return (args.style || "bullets") + " · " + (args.text||"").slice(0,40).replace(/\n/g," ");
    case "memory_store":   return args.key || "";
    case "memory_recall":  return args.key || "(all keys)";
    case "shorten_element":return args.name || (args.content||"").slice(0,40);
    default:               return "";
  }
}
function toolSummaryDone(tool, result){
  if(!result) return "";
  switch(tool){
    case "web_search":     return result.results ? `${result.results.length} results · ${result.source}` : "no results";
    case "html_fetch":     return result.title ? `"${result.title.slice(0,60)}" · ${result.length||0} chars` : `${result.length||0} chars`;
    case "js_exec":        return result.ok ? `→ ${String(result.result||"").slice(0,50)}` : "error";
    case "load_skill":     return result.ok ? (result.loaded_count > 1 ? `${result.loaded_count} skills loaded` : `${result.skills?.[0]?.name || result.name} loaded`) : "not found";
    case "parallel_think": return result.answers ? `${result.answers.length} models responded` : "";
    case "image_generate": return "image generated";
    case "file_upload":    return `${result.filename} · ${((result.size||0)/1024).toFixed(1)}KB · ${result.lines || 0} lines`;
    case "read_file":      return result.ok ? `"${result.filename}" · ${result.returned_chars} chars` : "not found";
    case "edit_file":      return result.ok ? `${result.filename} · ${result.new_size}B` : "error";
    case "extract_data":   return `${result.count} ${result.format}`;
    case "summarize":      return result.ok ? `${result.style} summary` : "error";
    case "memory_store":   return result.ok ? `stored: ${result.key}` : "error";
    case "memory_recall":  return result.ok ? (result.keys ? `${result.keys.length} keys` : `"${(result.value||"").slice(0,40)}"`) : "not found";
    case "shorten_element":return `${result.id} · ${result.length} chars`;
    default:               return "ok";
  }
}

function completeToolCard(id, result, ms){
  const el = document.querySelector(`.tool-card[data-id="${id}"]`);

  el.classList.remove("running");
  el.classList.add(hasErr ? "error" : "done");
  el.querySelector(".tool-status").innerHTML = `${hasErr ? "error" : "done"} · ${ms||0}ms`;
  el.querySelector(".tool-summary").textContent = toolSummaryDone(run.tool, result);
  scrollBottom();

function openToolModal(run){
  $modalIcon.innerHTML = ICONS[run.tool] || ICONS.web_search;
  $modalName.textContent = run.tool;
  const meta = [];
  if(run.elapsed_ms != null) meta.push(`${run.elapsed_ms}ms`);
  if(run.result && (run.result.error || run.result.ok===false)) meta.push("error");
  else if(run.result) meta.push("ok");
  $modalMeta.textContent = meta.join(" · ");

  $modalBody.innerHTML = "";
  const argsEl = document.createElement("div");
  argsEl.innerHTML = `<div class="modal-section-label">arguments</div><pre>${escapeHtml(JSON.stringify(run.args, null, 2))}</pre>`;
  $modalBody.appendChild(argsEl);

  const resEl = document.createElement("div");
  const r = run.result;
  if(!r){
    resEl.innerHTML = `<div class="modal-section-label">result</div><pre style="color:var(--text-3)">(running...)</pre>`;
  } else if(run.tool === "web_search" && Array.isArray(r.results)){
    const items = r.results.map(x=>`
      <div class="search-item">
        <a href="${escapeHtml(x.url)}" target="_blank" rel="noopener">${escapeHtml(x.title||x.url)}</a>
        <div class="url">${escapeHtml(x.url)}</div>
        <div class="snip">${escapeHtml(x.snippet||"")}</div>
      </div>
    `).join("");
    resEl.innerHTML = `<div class="modal-section-label">${r.results.length} results · via ${escapeHtml(r.source||"unknown")}</div>${items || '<pre>(empty)</pre>'}`;
  } else if(run.tool === "html_fetch"){
    resEl.innerHTML = `
      <div class="modal-section-label">page</div>
      <div style="padding:12px 14px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px">
        <div style="font-weight:600;font-size:13.5px">${escapeHtml(r.title||"(no title)")}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text-4);margin-top:3px">${escapeHtml(r.url||"")}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:3px">${r.length||0} chars${r.truncated?" · truncated":""}</div>
      </div>
      <div class="modal-section-label" style="margin-top:14px">extracted text</div>
      <pre>${escapeHtml(r.text||"")}</pre>

    let html = "";

    if(r.result != null) html += `<div class="modal-section-label" style="margin-top:12px">return</div><pre>${escapeHtml(String(r.result))}</pre>`;
    if(r.error) html += `<div class="modal-section-label" style="margin-top:12px;color:var(--danger)">error</div><pre style="color:var(--danger)">${escapeHtml(String(r.error))}</pre>`;
    resEl.innerHTML = html || `<pre>${escapeHtml(JSON.stringify(r,null,2))}</pre>`;
  } else if(run.tool === "load_skill"){
    if(r.ok){
      const skills = r.skills || (r.name ? [{name: r.name, content: r.content}] : []);
      resEl.innerHTML = skills.map(sk => `<div class="modal-section-label">skill: ${escapeHtml(sk.name)}</div><pre>${escapeHtml(sk.content||"")}</pre>`).join("") ||
                        `<div class="modal-section-label">loaded</div><pre>${escapeHtml(JSON.stringify(r,null,2))}</pre>`;

      <pre>${escapeHtml(JSON.stringify(r,null,2))}</pre>

    const ext = (r.filename||"").split(".").pop().toLowerCase();
    const isHtml = ["html","htm"].includes(ext);
    const isViewable = ["html","htm","txt","md","json","js","ts","css","py","xml","csv","svg"].includes(ext);

        <div style="flex:1;min-width:0">
          <div class="name">${escapeHtml(r.filename||"file")}</div>
          <div class="meta">${((r.size||0)/1024).toFixed(1)}KB · ${r.lines||"?"} lines · ${escapeHtml(r.language||"")}</div>
        </div>
        <a href="${r.download_url}" class="download" download="${escapeHtml(r.filename||"")}">Download</a>
      </div>
      ${isViewable ? `
        <div class="preview-toolbar">
          <a href="${r.preview_url}" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open ${isHtml ? "rendered" : "as text"}
          </a>
        </div>
        ${isHtml
          ? `<iframe class="preview-frame" src="${r.preview_url}" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>`
          : `<div class="modal-section-label" style="margin-top:12px">preview</div><iframe class="preview-frame" style="height:400px;background:#050505" src="${r.preview_url}"></iframe>`}
      ` : ""}
    `;
  } else if(run.tool === "read_file"){
    resEl.innerHTML = `
      <div class="modal-section-label">file</div>
      <div style="padding:11px 14px;background:var(--bg-2);border:1px solid var(--line);border-radius:9px">
        <div style="font-weight:600;font-size:13.5px">${escapeHtml(r.filename||"")}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:3px">${r.returned_chars} / ${r.total_chars} chars${r.truncated?" · truncated":""}</div>
      </div>
      <div class="modal-section-label" style="margin-top:14px">content</div>
      <pre>${escapeHtml(r.content||"")}</pre>
    `;
  } else if(run.tool === "shorten_element"){
    resEl.innerHTML = `<div class="modal-section-label">alias created</div><pre>${escapeHtml(JSON.stringify(r,null,2))}</pre>`;
  } else {
    resEl.innerHTML = `<div class="modal-section-label">result</div><pre>${escapeHtml(JSON.stringify(r,null,2))}</pre>`;
  }
  $modalBody.appendChild(resEl);

  openModal($modalBd);
}

function openModal(el){ el.classList.add("open"); document.body.style.overflow="hidden"; }
function closeModal(el){ el.classList.remove("open"); document.body.style.overflow=""; }

// ═══════════════════════════════════════════════════════════════
// Model picker
// ═══════════════════════════════════════════════════════════════
async function openModelPicker(){
  await ensureUpstreamModels();
  renderPicker();
  openModal($pickerBd);
}

async function ensureUpstreamModels(){
  if(state.upstreamModels.length) return;
  try {
    const r = await fetch("/api/upstream-models");
    const j = await r.json();
    state.upstreamModels = j.models || [];
  } catch(_){ state.upstreamModels = []; }
}

function renderPicker(){
  const isSelected = (id) => state.currentModel === id;

  const rec = RECOMMENDED_MODELS.map(m=>`
    <div class="picker-item ${isSelected(m.id)?"selected":""}" data-model="${m.id}">
      <div class="dot" style="background:linear-gradient(135deg, var(--accent), var(--accent-3));box-shadow:0 0 8px var(--accent-glow)"></div>
      <div class="info">
        <div class="n">${escapeHtml(m.label)}</div>
        <div class="p">${escapeHtml(m.desc)} · <code>${escapeHtml(m.id)}</code></div>
      </div>
      <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  `).join("");

  const otherModels = state.upstreamModels.filter(m => !RECOMMENDED_MODELS.some(r=>r.id===m.id));
  const others = otherModels.map(m=>`
    <div class="picker-item ${isSelected(m.id)?"selected":""}" data-model="${m.id}">
      <div class="dot" style="background:var(--text-3)"></div>
      <div class="info">
        <div class="n">${escapeHtml(MODEL_LABELS[m.id] || m.id)}</div>
        <div class="p">${escapeHtml(m.provider || "")} · <code>${escapeHtml(m.id)}</code></div>
      </div>
      <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
  `).join("");

  $pickerBody.innerHTML = `
    <input type="text" class="picker-search" placeholder="Search models..." id="pickerSearch" />
    <div class="picker-section-label">Recommended</div>
    ${rec}
    ${state.showAllModels ? `
      <div class="picker-section-label">More models (${otherModels.length})</div>
      ${others}
    ` : `
      <button class="picker-more" id="pickerMore">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        More models (${otherModels.length}) — nie-ai
      </button>
    `}
  `;

  $pickerBody.querySelectorAll(".picker-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      state.currentModel = el.dataset.model;
      localStorage.setItem("orby.model", state.currentModel);
      $modelBtnName.textContent = MODEL_LABELS[state.currentModel] || state.currentModel;
      closeModal($pickerBd);
    });
  });
  const more = document.getElementById("pickerMore");
  if(more) more.addEventListener("click", ()=>{ state.showAllModels = true; renderPicker(); });

  const search = document.getElementById("pickerSearch");
  search?.addEventListener("input", ()=>{
    const q = search.value.toLowerCase();
    $pickerBody.querySelectorAll(".picker-item").forEach(el=>{
      const t = el.textContent.toLowerCase();
      el.style.display = t.includes(q) ? "" : "none";
    });
  });
}

// ═══════════════════════════════════════════════════════════════
// Scroll
// ═══════════════════════════════════════════════════════════════
function shouldAutoScroll(){ return ($chat.scrollHeight - $chat.scrollTop - $chat.clientHeight) < 140; }
function scrollBottom(force){
  if(!force && !shouldAutoScroll()) return;
  requestAnimationFrame(()=>{ $chat.scrollTop = $chat.scrollHeight; });
}

// ═══════════════════════════════════════════════════════════════
// Send / SSE
// ═══════════════════════════════════════════════════════════════
async function send(){
  if(state.running) return;
  const text = $input.value.trim();
  if(!text && state.attachments.length===0) return;
  const messageText = text || (state.attachments.length ? `添付ファイルを分析してください` : "");
  $input.value=""; autoGrow();

  const attachmentsSnapshot = state.attachments.slice();
  addUserBubble(messageText, attachmentsSnapshot);
  state.messages.push({role:"user", content: messageText});

  state.running = true;
  $sendBtn.disabled = true;
  $stopBtn.style.display = "inline-block";

  let currentBubble = null;
  let currentMsg = null;
  let assistantRawBuffer = "";
  const statusPill = addStatus("thinking…");

  function ensureBubble(){
    if(!currentBubble){
      const b = addAssistantBubble();
      currentBubble = b.bubble; currentMsg = b.msg;
      assistantRawBuffer = "";
    }
  }
  function finalizeBubble(){
    if(currentBubble){
      const clean = stripToolBlocks(assistantRawBuffer);
      if(clean.trim()) currentBubble.innerHTML = renderMarkdown(clean);
      else if(currentMsg) currentMsg.style.display = "none";
    }
    currentBubble = null; currentMsg = null; assistantRawBuffer = "";
  }

  try {
    state.abortCtl = new AbortController();
    const res = await fetch("/api/agent", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        messages: state.messages,
        model: state.currentModel,
        attachments: attachmentsSnapshot.map(a=>a.id),
      }),
      signal: state.abortCtl.signal,
    });
    if(!res.ok || !res.body) throw new Error("HTTP "+res.status);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";

    function handleEvent(event, data){
      try{ data = JSON.parse(data); }catch(_){ return; }
      if(event==="round"){
        updateStatus(statusPill, `round ${data.round} · reasoning…`);
        if(data.round > 1 && currentBubble) finalizeBubble();
      }
      else if(event==="assistant_start"){
        ensureBubble();
        if(data.model_used && currentMsg){
          // Insert small model badge above role label (once per bubble)
          const roleEl = currentMsg.querySelector(".role");
          if(roleEl && !currentMsg.querySelector(".model-badge")){
            const badge = document.createElement("span");
            badge.className = "model-badge";
            badge.style.cssText = "font-size:10px;color:var(--text-4);font-family:var(--mono);margin-left:8px;letter-spacing:.02em;text-transform:none;font-weight:500";
            badge.innerHTML = `· ${escapeHtml(data.model_used)}` + (data.category && data.category !== "chat" ? ` · <span style="color:var(--accent)">${escapeHtml(data.category)}</span>` : "");
            roleEl.appendChild(badge);
          }
        }
      }
      else if(event==="assistant_reset"){
        assistantRawBuffer = "";
        if(currentBubble) currentBubble.innerHTML = "";
      }
      else if(event==="assistant_delta"){
        ensureBubble();
        assistantRawBuffer += data.text;
        const display = stripToolBlocks(assistantRawBuffer);
        currentBubble.innerHTML = renderMarkdown(display) + (display.trim()?`<span class="cursor"></span>`:"");
        scrollBottom();
      }
      else if(event==="assistant_end"){}
      else if(event==="tools_start"){
        finalizeBubble();
        updateStatus(statusPill, `${data.count} tool${data.count>1?"s":""} running…`);
      }
      else if(event==="tool_call"){ addToolCard(data.id, data.tool, data.args||{}); }
      else if(event==="tool_result"){ completeToolCard(data.id, data.result, data.elapsed_ms); }
      else if(event==="final"){
        finalizeBubble();
        if(assistantRawBuffer) state.messages.push({role:"assistant", content: assistantRawBuffer});
        else if(data.text) state.messages.push({role:"assistant", content: data.text});
      }
      else if(event==="error"){
        const p = addStatus("⚠ " + data.message);
        p.style.borderColor = "rgba(248,113,113,.3)"; p.style.color = "var(--danger)";
      }
      else if(event==="done"){ try{ statusPill.remove(); }catch(_){} }
    }

    while(true){
      const {value, done} = await reader.read();
      if(done) break;
      buf += decoder.decode(value, {stream:true});
      let sep;
      while((sep = buf.indexOf("\n\n")) >= 0){
        const raw = buf.slice(0, sep);
        buf = buf.slice(sep+2);
        const lines = raw.split("\n");
        let event="message", data="";
        for(const ln of lines){
          if(ln.startsWith("event:")) event = ln.slice(6).trim();
          else if(ln.startsWith("data:")) data += ln.slice(5).trim();
        }
        if(data) handleEvent(event, data);
      }
    }
  } catch(e) {
    if(e.name!=="AbortError"){
      const p = addStatus("⚠ " + (e.message||e));
      p.style.borderColor = "rgba(248,113,113,.3)"; p.style.color = "var(--danger)";
    }
  } finally {
    state.running = false; state.abortCtl = null;
    $sendBtn.disabled = false; $stopBtn.style.display = "none";
    try{ statusPill.remove(); }catch(_){}
    if(currentBubble){
      const clean = stripToolBlocks(assistantRawBuffer);
      if(clean.trim()) currentBubble.innerHTML = renderMarkdown(clean);
      else if(currentMsg) currentMsg.style.display = "none";
    }
    saveActiveToHistory();
    scrollBottom(true);
    $input.focus();
  }
}
